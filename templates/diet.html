<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Plan - AI Fitness Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3 class="brand-title mb-4">💪 Fitness</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('dashboard') }}">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('workout') }}">
                        <i class="fas fa-dumbbell"></i> Workouts
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('diet') }}">
                        <i class="fas fa-apple-alt"></i> Diet Plan
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('tracker') }}">
                        <i class="fas fa-edit"></i> Tracker
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('profile') }}">
                        <i class="fas fa-user"></i> Profile
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <h2><i class="fas fa-apple-alt"></i> Your Diet Plan</h2>
            </div>

            <div class="page-content">
                <!-- Loading -->
                <div id="loadingSpinner" class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <!-- Diet Plan -->
                <div id="dietPlan" style="display:none;">
                    <!-- Macronutrients -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="macro-card">
                                <div class="macro-color protein"></div>
                                <h6>Protein</h6>
                                <h3 id="proteinValue">--</h3>
                                <small class="text-muted">grams/day</small>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="macro-card">
                                <div class="macro-color carbs"></div>
                                <h6>Carbs</h6>
                                <h3 id="carbsValue">--</h3>
                                <small class="text-muted">grams/day</small>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="macro-card">
                                <div class="macro-color fat"></div>
                                <h6>Fat</h6>
                                <h3 id="fatValue">--</h3>
                                <small class="text-muted">grams/day</small>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="macro-card">
                                <div class="macro-color calories"></div>
                                <h6>Daily Calories</h6>
                                <h3 id="caloriesValue">--</h3>
                                <small class="text-muted">kcal</small>
                            </div>
                        </div>
                    </div>

                    <!-- Meals -->
                    <div class="row" id="mealsList"></div>

                    <div class="row mt-4">
                        <div class="col-md-12">
                            <div class="chart-card">
                                <h5 class="mb-3"><i class="fas fa-robot"></i> AI Meal Suggestions</h5>
                                <div id="aiMealSuggestions" class="meal-suggestions">
                                    <p class="text-muted">Loading AI meal recommendations...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Log Food Button -->
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <button class="btn btn-gradient btn-lg w-100" data-bs-toggle="modal"
                                data-bs-target="#logFoodModal">
                                <i class="fas fa-plus"></i> Log Food Item
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Food Modal -->
    <div class="modal fade" id="logFoodModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Log Food</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="logFoodForm">
                        <div class="mb-3">
                            <label for="mealType" class="form-label">Meal Type</label>
                            <select class="form-control" id="mealType" required>
                                <option value="">Select meal</option>
                                <option value="Breakfast">Breakfast</option>
                                <option value="Lunch">Lunch</option>
                                <option value="Snack">Snack</option>
                                <option value="Dinner">Dinner</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="foodItem" class="form-label">Food Item</label>
                            <input type="text" class="form-control" id="foodItem" placeholder="e.g., Grilled Chicken"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="quantity" class="form-label">Quantity (grams)</label>
                            <input type="number" class="form-control" id="quantity" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label for="calories" class="form-label">Calories</label>
                            <input type="number" class="form-control" id="calories" min="0" required>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="protein" class="form-label">Protein (g)</label>
                                <input type="number" class="form-control" id="protein" min="0" step="0.1" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="carbs" class="form-label">Carbs (g)</label>
                                <input type="number" class="form-control" id="carbs" min="0" step="0.1" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="fat" class="form-label">Fat (g)</label>
                                <input type="number" class="form-control" id="fat" min="0" step="0.1" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">Log Food</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let macroData = {};

        async function loadDietPlan() {
            try {
                const response = await fetch('/api/diet-plan');
                const data = await response.json();

                if (data.success) {
                    document.getElementById('loadingSpinner').style.display = 'none';
                    document.getElementById('dietPlan').style.display = 'block';

                    // Get recommendations for macros
                    const recResponse = await fetch('/api/recommendations');
                    const recData = await recResponse.json();

                    if (recData.success) {
                        macroData = recData.plan.macronutrients;
                        document.getElementById('proteinValue').textContent = macroData.protein_g;
                        document.getElementById('carbsValue').textContent = macroData.carbs_g;
                        document.getElementById('fatValue').textContent = macroData.fat_g;
                        document.getElementById('caloriesValue').textContent = macroData.daily_calories;
                    }

                    const mealSuggestionsResponse = await fetch('/api/ai-meal-suggestions');
                    const mealSuggestionsData = await mealSuggestionsResponse.json();
                    const mealSuggestionsElement = document.getElementById('aiMealSuggestions');
                    if (mealSuggestionsData.success) {
                        let suggestionsHtml = '';
                        Object.entries(mealSuggestionsData.suggestions).forEach(([meal, options]) => {
                            suggestionsHtml += `<div class="meal-suggestion-group mb-4"><h6>${meal.charAt(0).toUpperCase() + meal.slice(1)}</h6>`;
                            options.forEach(option => {
                                suggestionsHtml += `<div class="meal-option"><strong>${option.item}</strong> — ${option.calories} kcal, ${option.protein}g protein</div>`;
                            });
                            suggestionsHtml += '</div>';
                        });
                        mealSuggestionsElement.innerHTML = suggestionsHtml;
                    } else {
                        mealSuggestionsElement.innerHTML = '<p class="text-muted">No AI meal suggestions are available.</p>';
                    }

                    // Display meals
                    let html = '';
                    data.diet_plan.meals.forEach(meal => {
                        html += `
                            <div class="col-md-6 mb-4">
                                <div class="meal-card">
                                    <h5>${meal.meal}</h5>
                                    <div class="meal-options">
        `;
                        meal.options.forEach(option => {
                            html += `<div class="meal-option"><i class="fas fa-check-circle text-success me-2"></i> ${option}</div>`;
                        });
                        html += `
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById('mealsList').innerHTML = html;
                }
            } catch (error) {
                console.error('Error loading diet plan:', error);
                document.getElementById('loadingSpinner').innerHTML = '<p class="text-danger">Error loading diet plan</p>';
            }
        }

        document.getElementById('logFoodForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                meal_type: document.getElementById('mealType').value,
                food_item: document.getElementById('foodItem').value,
                quantity: document.getElementById('quantity').value,
                calories: document.getElementById('calories').value,
                protein: document.getElementById('protein').value,
                carbs: document.getElementById('carbs').value,
                fat: document.getElementById('fat').value
            };

            try {
                const response = await fetch('/api/track-diet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    alert('✅ Food logged successfully!');
                    document.getElementById('logFoodForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('logFoodModal')).hide();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('Error logging food');
            }
        });

        loadDietPlan();
    </script>
</body>

</html>
