<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Fitness Coach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 900px;
            margin: 30px auto;
        }

        .chat-panel {
            background: #f7f8fc;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
        }

        .chat-header {
            padding: 25px;
            background: #667eea;
            color: white;
        }

        .chat-header h3 {
            margin: 0;
            font-weight: 700;
        }

        .chat-body {
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            background: white;
        }

        .chat-message {
            display: flex;
            margin-bottom: 18px;
        }

        .chat-message.bot {
            justify-content: flex-start;
        }

        .chat-message.user {
            justify-content: flex-end;
        }

        .chat-bubble {
            max-width: 75%;
            padding: 15px 18px;
            border-radius: 18px;
            line-height: 1.6;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
        }

        .chat-bubble.bot {
            background: #eef3ff;
            color: #1f2d5c;
            border-bottom-left-radius: 2px;
        }

        .chat-bubble.user {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .chat-footer {
            padding: 20px;
            background: #f7f8fc;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #e8ebf1;
        }

        .chat-footer input {
            flex: 1;
            border-radius: 50px;
            border: 1px solid #d7dce6;
            padding: 14px 18px;
        }

        .chat-footer button {
            border-radius: 50px;
            padding: 12px 18px;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .bot-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #fff;
            display: grid;
            place-items: center;
            color: #667eea;
            margin-right: 12px;
        }

        .chat-body::-webkit-scrollbar {
            width: 8px;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.25);
            border-radius: 10px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: #f7f8fc;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-panel">
            <div class="chat-header d-flex justify-content-between align-items-center">
                <div>
                    <h3>AI Fitness Coach</h3>
                    <p class="mb-0">Ask about your physique, diet, workouts, or transformation progress.</p>
                </div>
                <div class="status-chip" id="chatStatus">
                    <i class="fas fa-check-circle"></i>
                    Connected
                </div>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="chat-message bot">
                    <div class="chat-bubble bot">
                        Hi! I am your AI fitness coach. How can I help you today?
                    </div>
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" id="chatInput" placeholder="Type your question here..." autocomplete="off">
                <button class="btn btn-primary" id="sendButton"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const chatBody = document.getElementById('chatBody');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const chatStatus = document.getElementById('chatStatus');

        socket.on('connect', () => {
            chatStatus.innerHTML = '<i class="fas fa-check-circle"></i> Connected';
        });

        socket.on('disconnect', () => {
            chatStatus.innerHTML = '<i class="fas fa-times-circle"></i> Disconnected';
        });

        socket.on('chat_response', (data) => {
            appendMessage('bot', data.message);
        });

        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            appendMessage('user', message);
            chatInput.value = '';
            socket.emit('user_message', { message });
        }

        function appendMessage(sender, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `chat-message ${sender}`;
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${sender}`;
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatBody.appendChild(wrapper);
            chatBody.scrollTop = chatBody.scrollHeight;
        }
    </script>
</body>

</html>
