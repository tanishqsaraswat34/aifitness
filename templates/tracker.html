<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker - AI Fitness Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3 class="brand-title mb-4">💪 Fitness</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('dashboard') }}">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('workout') }}">
                        <i class="fas fa-dumbbell"></i> Workouts
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('diet') }}">
                        <i class="fas fa-apple-alt"></i> Diet Plan
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('tracker') }}">
                        <i class="fas fa-edit"></i> Tracker
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('profile') }}">
                        <i class="fas fa-user"></i> Profile
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <h2><i class="fas fa-edit"></i> Track Your Progress</h2>
            </div>

            <div class="page-content">
                <!-- Tracker Cards -->
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="tracker-card">
                            <div class="tracker-header">
                                <i class="fas fa-weight"></i>
                                <h5>Track Weight</h5>
                            </div>
                            <form id="weightForm">
                                <div class="mb-3">
                                    <label for="weight" class="form-label">Weight (kg)</label>
                                    <input type="number" class="form-control" id="weight"
                                        placeholder="Enter your weight" step="0.1" required>
                                </div>
                                <div class="mb-3">
                                    <label for="bodyFat" class="form-label">Body Fat % (Optional)</label>
                                    <input type="number" class="form-control" id="bodyFat" placeholder="Optional"
                                        step="0.1">
                                </div>
                                <div class="mb-3">
                                    <label for="chest" class="form-label">Chest (cm) (Optional)</label>
                                    <input type="number" class="form-control" id="chest" placeholder="Optional"
                                        step="0.1">
                                </div>
                                <div class="mb-3">
                                    <label for="waist" class="form-label">Waist (cm) (Optional)</label>
                                    <input type="number" class="form-control" id="waist" placeholder="Optional"
                                        step="0.1">
                                </div>
                                <button type="submit" class="btn btn-gradient w-100">Log Weight</button>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-6 mb-4">
                        <div class="tracker-card">
                            <div class="tracker-header">
                                <i class="fas fa-water"></i>
                                <h5>Daily Summary</h5>
                            </div>
                            <div id="dailySummary">
                                <p class="text-muted">Loading...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Log Section -->
                <div class="row">
                    <div class="col-md-4 mb-4">
                        <div class="quick-log-card">
                            <div class="quick-log-icon workout">
                                <i class="fas fa-dumbbell"></i>
                            </div>
                            <h5>Log Workout</h5>
                            <p class="text-muted">Track your exercise</p>
                            <button class="btn btn-sm btn-outline-primary w-100" data-bs-toggle="modal"
                                data-bs-target="#quickWorkoutModal">
                                Log Now
                            </button>
                        </div>
                    </div>

                    <div class="col-md-4 mb-4">
                        <div class="quick-log-card">
                            <div class="quick-log-icon food">
                                <i class="fas fa-utensils"></i>
                            </div>
                            <h5>Log Food</h5>
                            <p class="text-muted">Track your meals</p>
                            <button class="btn btn-sm btn-outline-primary w-100" data-bs-toggle="modal"
                                data-bs-target="#quickFoodModal">
                                Log Now
                            </button>
                        </div>
                    </div>

                    <div class="col-md-4 mb-4">
                        <div class="quick-log-card">
                            <div class="quick-log-icon water">
                                <i class="fas fa-glass-water"></i>
                            </div>
                            <h5>Water Intake</h5>
                            <p class="text-muted">Log your water</p>
                            <button class="btn btn-sm btn-outline-primary w-100" data-bs-toggle="modal"
                                data-bs-target="#waterModal">
                                Log Now
                            </button>
                        </div>
                    </div>
                </div>

                <!-- BMI Calculator -->
                <div class="row">
                    <div class="col-md-12 mb-4">
                        <div class="tracker-card">
                            <div class="tracker-header">
                                <i class="fas fa-calculator"></i>
                                <h5>BMI Calculator</h5>
                            </div>
                            <form id="bmiForm">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="bmiHeight" class="form-label">Height (cm)</label>
                                        <input type="number" class="form-control" id="bmiHeight"
                                            placeholder="Height in cm" step="0.1" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="bmiWeight" class="form-label">Weight (kg)</label>
                                        <input type="number" class="form-control" id="bmiWeight"
                                            placeholder="Weight in kg" step="0.1" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-gradient w-100">Calculate BMI</button>
                            </form>
                            <div id="bmiResult" class="mt-3" style="display:none;">
                                <h5 id="bmiResultValue"></h5>
                                <p id="bmiResultCategory"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Workout Modal -->
    <div class="modal fade" id="quickWorkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Log Workout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="quickWorkoutForm">
                        <div class="mb-3">
                            <label for="qWorkoutName" class="form-label">Workout Name</label>
                            <input type="text" class="form-control" id="qWorkoutName" placeholder="e.g., Morning Run"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="qWorkoutType" class="form-label">Workout Type</label>
                            <select class="form-control" id="qWorkoutType" required>
                                <option value="Cardio">Cardio</option>
                                <option value="Strength">Strength</option>
                                <option value="Flexibility">Flexibility</option>
                                <option value="Sports">Sports</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="qWorkoutDuration" class="form-label">Duration (minutes)</label>
                            <input type="number" class="form-control" id="qWorkoutDuration" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label for="qWorkoutCalories" class="form-label">Calories Burned</label>
                            <input type="number" class="form-control" id="qWorkoutCalories" min="0" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">Log Workout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Food Modal -->
    <div class="modal fade" id="quickFoodModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Log Food</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="quickFoodForm">
                        <div class="mb-3">
                            <label for="qMealType" class="form-label">Meal Type</label>
                            <select class="form-control" id="qMealType" required>
                                <option value="Breakfast">Breakfast</option>
                                <option value="Lunch">Lunch</option>
                                <option value="Snack">Snack</option>
                                <option value="Dinner">Dinner</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="qFoodItem" class="form-label">Food Item</label>
                            <input type="text" class="form-control" id="qFoodItem" placeholder="e.g., Grilled Chicken"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="qQuantity" class="form-label">Quantity (grams)</label>
                            <input type="number" class="form-control" id="qQuantity" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label for="qCalories" class="form-label">Calories</label>
                            <input type="number" class="form-control" id="qCalories" min="0" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">Log Food</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Water Modal -->
    <div class="modal fade" id="waterModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Log Water Intake</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="waterForm">
                        <div class="mb-3">
                            <label for="waterAmount" class="form-label">Water (liters)</label>
                            <input type="number" class="form-control" id="waterAmount" placeholder="e.g., 2.5"
                                step="0.1" min="0" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">Log Water</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load daily summary
        async function loadDailySummary() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const response = await fetch(`/api/daily-summary?date=${today}`);
                const data = await response.json();

                if (data.success) {
                    const summary = data.summary;
                    document.getElementById('dailySummary').innerHTML = `
                        <div class="summary-stat">
                            <h6 class="text-muted">Consumed Today</h6>
                            <h4>${summary.consumed} kcal</h4>
                        </div>
                        <div class="summary-stat">
                            <h6 class="text-muted">Burned Today</h6>
                            <h4>${summary.burned} kcal</h4>
                        </div>
                        <div class="summary-stat">
                            <h6 class="text-muted">Net Calories</h6>
                            <h4 class="${summary.consumed - summary.burned > 0 ? 'text-danger' : 'text-success'}">
                                ${summary.consumed - summary.burned} kcal
                            </h4>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading summary:', error);
            }
        }

        // Weight tracking
        document.getElementById('weightForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                weight: document.getElementById('weight').value,
                body_fat: document.getElementById('bodyFat').value || null,
                chest: document.getElementById('chest').value || null,
                waist: document.getElementById('waist').value || null
            };

            try {
                const response = await fetch('/api/track-weight', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    alert('✅ Weight tracked successfully!');
                    document.getElementById('weightForm').reset();
                    loadDailySummary();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('Error tracking weight');
            }
        });

        // BMI Calculator
        document.getElementById('bmiForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                height: document.getElementById('bmiHeight').value,
                weight: document.getElementById('bmiWeight').value
            };

            try {
                const response = await fetch('/api/calculate-bmi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    document.getElementById('bmiResultValue').textContent = `BMI: ${data.bmi.bmi}`;
                    document.getElementById('bmiResultCategory').innerHTML = `
                        <strong>Category:</strong> ${data.bmi.category}<br>
                        <small>${data.bmi.message}</small>
                    `;
                    document.getElementById('bmiResult').style.display = 'block';
                }
            } catch (error) {
                alert('Error calculating BMI');
            }
        });

        // Quick workout form
        document.getElementById('quickWorkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('qWorkoutName').value,
                workout_type: document.getElementById('qWorkoutType').value,
                duration: document.getElementById('qWorkoutDuration').value,
                calories_burned: document.getElementById('qWorkoutCalories').value,
                difficulty: 'Intermediate'
            };

            try {
                const response = await fetch('/api/track-workout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    alert('✅ Workout logged!');
                    document.getElementById('quickWorkoutForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('quickWorkoutModal')).hide();
                    loadDailySummary();
                }
            } catch (error) {
                alert('Error logging workout');
            }
        });

        // Quick food form
        document.getElementById('quickFoodForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                meal_type: document.getElementById('qMealType').value,
                food_item: document.getElementById('qFoodItem').value,
                quantity: document.getElementById('qQuantity').value,
                calories: document.getElementById('qCalories').value,
                protein: 0,
                carbs: 0,
                fat: 0
            };

            try {
                const response = await fetch('/api/track-diet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    alert('✅ Food logged!');
                    document.getElementById('quickFoodForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('quickFoodModal')).hide();
                    loadDailySummary();
                }
            } catch (error) {
                alert('Error logging food');
            }
        });

        // Load on page load
        loadDailySummary();
        setInterval(loadDailySummary, 60000); // Refresh every minute
    </script>
</body>

</html>
