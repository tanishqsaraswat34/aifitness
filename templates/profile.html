<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Fitness Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3 class="brand-title mb-4">💪 Fitness</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('dashboard') }}">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('workout') }}">
                        <i class="fas fa-dumbbell"></i> Workouts
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('diet') }}">
                        <i class="fas fa-apple-alt"></i> Diet Plan
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('tracker') }}">
                        <i class="fas fa-edit"></i> Tracker
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('profile') }}">
                        <i class="fas fa-user"></i> Profile
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <h2><i class="fas fa-user-circle"></i> My Profile</h2>
            </div>

            <div class="page-content">
                <div class="row">
                    <div class="col-md-8">
                        <div class="profile-card">
                            <h4 class="mb-4"><i class="fas fa-edit"></i> Profile Information</h4>

                            <div id="loadingSpinner" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>

                            <form id="profileForm" style="display:none;">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="username" class="form-label">Username</label>
                                        <input type="text" class="form-control" id="username" readonly>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" readonly>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="name" class="form-label">Full Name</label>
                                        <input type="text" class="form-control" id="name" readonly>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="age" class="form-label">Age</label>
                                        <input type="number" class="form-control" id="age" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="height" class="form-label">Height (cm)</label>
                                        <input type="number" class="form-control" id="height" step="0.1" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="weight" class="form-label">Weight (kg)</label>
                                        <input type="number" class="form-control" id="weight" step="0.1" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="gender" class="form-label">Gender</label>
                                        <input type="text" class="form-control" id="gender" readonly>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="fitness_goal" class="form-label">Fitness Goal</label>
                                        <select class="form-control" id="fitness_goal" required>
                                            <option value="weight_loss">Weight Loss</option>
                                            <option value="muscle_gain">Muscle Gain</option>
                                            <option value="maintenance">Maintenance</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="createdAt" class="form-label">Member Since</label>
                                    <input type="text" class="form-control" id="createdAt" readonly>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-gradient flex-grow-1">
                                        <i class="fas fa-save"></i> Save Changes
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary flex-grow-1"
                                        onclick="location.href='/dashboard'">
                                        <i class="fas fa-arrow-left"></i> Back
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <!-- Profile Stats -->
                        <div class="profile-card">
                            <h5 class="mb-4"><i class="fas fa-info-circle"></i> Quick Stats</h5>
                            <div id="profileStats">
                                <p class="text-muted">Loading...</p>
                            </div>
                        </div>

                        <!-- Account Settings -->
                        <div class="profile-card mt-4">
                            <h5 class="mb-4"><i class="fas fa-cog"></i> Account Settings</h5>
                            <button class="btn btn-outline-danger w-100 mb-2" data-bs-toggle="modal"
                                data-bs-target="#changePasswordModal">
                                <i class="fas fa-key"></i> Change Password
                            </button>
                            <button class="btn btn-outline-danger w-100" onclick="deleteAccount()">
                                <i class="fas fa-trash"></i> Delete Account
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Change Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-3">Password changes are coming soon. Please contact support.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadProfile() {
            try {
                const response = await fetch('/api/profile');
                const data = await response.json();

                if (data.success) {
                    const user = data.user;

                    // Fill form
                    document.getElementById('username').value = user.username;
                    document.getElementById('email').value = user.email;
                    document.getElementById('name').value = user.name;
                    document.getElementById('age').value = user.age;
                    document.getElementById('height').value = user.height;
                    document.getElementById('weight').value = user.weight;
                    document.getElementById('gender').value = user.gender;
                    document.getElementById('fitness_goal').value = user.fitness_goal;
                    document.getElementById('createdAt').value = new Date(user.created_at).toLocaleDateString();

                    // Show form
                    document.getElementById('loadingSpinner').style.display = 'none';
                    document.getElementById('profileForm').style.display = 'block';

                    // Show stats
                    document.getElementById('profileStats').innerHTML = `
                        <div class="stat-row mb-3">
                            <span class="text-muted">Age</span>
                            <span class="text-dark fw-bold">${user.age} years</span>
                        </div>
                        <div class="stat-row mb-3">
                            <span class="text-muted">Height</span>
                            <span class="text-dark fw-bold">${user.height} cm</span>
                        </div>
                        <div class="stat-row mb-3">
                            <span class="text-muted">Weight</span>
                            <span class="text-dark fw-bold">${user.weight} kg</span>
                        </div>
                        <div class="stat-row mb-3">
                            <span class="text-muted">Goal</span>
                            <span class="text-dark fw-bold">${user.fitness_goal.replace('_', ' ').toUpperCase()}</span>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                age: document.getElementById('age').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                fitness_goal: document.getElementById('fitness_goal').value
            };

            try {
                const response = await fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    alert('✅ Profile updated successfully!');
                    loadProfile();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('Error updating profile');
            }
        });

        function deleteAccount() {
            if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                alert('Account deletion is coming soon. Please contact support.');
            }
        }

        loadProfile();
    </script>
</body>

</html>
