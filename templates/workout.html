<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts - AI Fitness Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3 class="brand-title mb-4">💪 Fitness</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('dashboard') }}">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('workout') }}">
                        <i class="fas fa-dumbbell"></i> Workouts
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('diet') }}">
                        <i class="fas fa-apple-alt"></i> Diet Plan
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('tracker') }}">
                        <i class="fas fa-edit"></i> Tracker
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('profile') }}">
                        <i class="fas fa-user"></i> Profile
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <h2><i class="fas fa-dumbbell"></i> Personalized Workouts</h2>
            </div>

            <div class="page-content">
                <!-- Loading -->
                <div id="loadingSpinner" class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <!-- Workout Plan -->
                <div id="workoutPlan" style="display:none;">
                    <!-- BMI Info -->
                    <div class="alert alert-info" id="bmiAlert"></div>

                    <!-- Workouts -->
                    <div class="row" id="workoutsList"></div>

                    <!-- Tips -->
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <div class="chart-card">
                                <h5 class="mb-3"><i class="fas fa-lightbulb"></i> Fitness Tips</h5>
                                <ul id="tipsList" class="list-group list-group-flush"></ul>
                            </div>
                        </div>
                    </div>
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <div class="chart-card">
                                <h5 class="mb-3"><i class="fas fa-robot"></i> AI Smart Notes</h5>
                                <ul id="aiNotesList" class="list-group list-group-flush"></ul>
                            </div>
                        </div>
                    </div>

                    <!-- Log Workout Button -->
                    <div class="row mt-4">
                        <div class="col-md-12">
                            <button class="btn btn-gradient btn-lg w-100" data-bs-toggle="modal"
                                data-bs-target="#logWorkoutModal">
                                <i class="fas fa-plus"></i> Log Today's Workout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Workout Modal -->
    <div class="modal fade" id="logWorkoutModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Log Workout</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="logWorkoutForm">
                        <div class="mb-3">
                            <label for="workoutName" class="form-label">Workout Name</label>
                            <input type="text" class="form-control" id="workoutName" placeholder="e.g., Morning Run"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="workoutType" class="form-label">Workout Type</label>
                            <select class="form-control" id="workoutType" required>
                                <option value="">Select type</option>
                                <option value="Cardio">Cardio</option>
                                <option value="Strength">Strength</option>
                                <option value="Flexibility">Flexibility</option>
                                <option value="Sports">Sports</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="workoutDuration" class="form-label">Duration (minutes)</label>
                            <input type="number" class="form-control" id="workoutDuration" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label for="workoutCalories" class="form-label">Calories Burned</label>
                            <input type="number" class="form-control" id="workoutCalories" min="0" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">Log Workout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadWorkoutPlan() {
            try {
                const response = await fetch('/api/ai-workout-plan');
                const data = await response.json();

                if (data.success) {
                    document.getElementById('loadingSpinner').style.display = 'none';
                    document.getElementById('workoutPlan').style.display = 'block';

                    // Show BMI
                    const bmi = data.plan.bmi_info;
                    document.getElementById('bmiAlert').innerHTML =
                        `<strong>Your BMI:</strong> ${bmi.bmi} - ${bmi.category}. ${bmi.message}`;

                    // Show workouts
                    let html = '';
                    data.plan.weekly_workouts.forEach(w => {
                        html += `
                            <div class="col-md-6 mb-4">
                                <div class="workout-card">
                                    <div class="workout-icon">
                                        <i class="fas fa-fire"></i>
                                    </div>
                                    <h5>${w.name}</h5>
                                    <p class="text-muted">${w.type}</p>
                                    <ul class="workout-details">
                                        <li><strong>Duration:</strong> ${w.duration} minutes</li>
                                        <li><strong>Calories:</strong> ~${w.calories} kcal</li>
                                        <li><strong>Description:</strong> ${w.description}</li>
                                    </ul>
                                </div>
                            </div>
                        `;
                    });
                    document.getElementById('workoutsList').innerHTML = html;

                    // Show tips
                    let tipHtml = '';
                    data.plan.tips.forEach(tip => {
                        tipHtml += `<li class="list-group-item"><i class="fas fa-check-circle text-success me-2"></i> ${tip}</li>`;
                    });
                    document.getElementById('tipsList').innerHTML = tipHtml;

                    // AI notes
                    const aiNotesElement = document.getElementById('aiNotesList');
                    if (data.plan && data.plan.ai_notes && data.plan.ai_notes.length > 0) {
                        let notesHtml = '';
                        data.plan.ai_notes.forEach(note => {
                            notesHtml += `<li class="list-group-item">${note}</li>`;
                        });
                        aiNotesElement.innerHTML = notesHtml;
                    } else {
                        aiNotesElement.innerHTML = '<li class="list-group-item text-muted">No AI notes available yet.</li>';
                    }
                }
            } catch (error) {
                console.error('Error loading workout plan:', error);
                document.getElementById('loadingSpinner').innerHTML = '<p class="text-danger">Error loading workout plan</p>';
            }
        }

        document.getElementById('logWorkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('workoutName').value,
                workout_type: document.getElementById('workoutType').value,
                duration: document.getElementById('workoutDuration').value,
                calories_burned: document.getElementById('workoutCalories').value,
                difficulty: 'Intermediate'
            };

            try {
                const response = await fetch('/api/track-workout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                if (data.success) {
                    alert('✅ Workout logged successfully!');
                    document.getElementById('logWorkoutForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('logWorkoutModal')).hide();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('Error logging workout');
            }
        });

        loadWorkoutPlan();
    </script>
</body>

</html>
